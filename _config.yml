# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: CMD-Design
email: chad.m.danford@gmail.com
statement: <span>structure</span> <span>for</span> <span>digtal</span> <span>brands</span> <span>and</span> <span>products</span>
default_lang: en
description_en: Bringing structure and clarity to digital brands, products and systems.
description_de: Struktur und Klarheit für digitale Marken, Produkte und Systeme.
details_en: Most digital brands aren’t broken — they’re just fragmented. I bring structure to that complexity, turning disconnected design, product and communication into clear, consistent systems teams can actually use and build on. The result is less friction, better decisions and a setup that holds up over time.
details_de: Die meisten digitalen Marken sind nicht kaputt – sie sind fragmentiert. Ich bringe Struktur in diese Komplexität und verbinde Design, Produkt und Kommunikation zu klaren, konsistenten Systemen, mit denen Teams tatsächlich arbeiten und weiterbauen können. Weniger Reibung, bessere Entscheidungen und eine Grundlage, die langfristig funktioniert.
url: "https://www.cmd-design.com" # the base hostname & protocol for your site
baseurl: ""

defaults:
  - scope:
      path: "assets/images"
    values:
      image: true

# Build settings
plugins:
  - jekyll-feed

excerpt_separator: <!--end_excerpt-->

snippets:
  all-tags: "all work"



