<button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
  <svg class="theme-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <!-- Sun icon -->
    <circle class="sun-icon" cx="12" cy="12" r="5" style="display: none;"></circle>
    <line class="sun-icon" x1="12" y1="1" x2="12" y2="3" style="display: none;"></line>
    <line class="sun-icon" x1="12" y1="21" x2="12" y2="23" style="display: none;"></line>
    <line class="sun-icon" x1="4.22" y1="4.22" x2="5.64" y2="5.64" style="display: none;"></line>
    <line class="sun-icon" x1="18.36" y1="18.36" x2="19.78" y2="19.78" style="display: none;"></line>
    <line class="sun-icon" x1="1" y1="12" x2="3" y2="12" style="display: none;"></line>
    <line class="sun-icon" x1="21" y1="12" x2="23" y2="12" style="display: none;"></line>
    <line class="sun-icon" x1="4.22" y1="19.78" x2="5.64" y2="18.36" style="display: none;"></line>
    <line class="sun-icon" x1="18.36" y1="5.64" x2="19.78" y2="4.22" style="display: none;"></line>
    
    <!-- Moon icon -->
    <path class="moon-icon" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
</button>

<style>
  .theme-toggle {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-neutral-10);
    transition: color 0.3s ease;
  }

  .theme-toggle:hover {
    opacity: 1;
  }

  :root[data-theme="light"] .theme-toggle {
    color: var(--color-neutral-90);
  }

  .theme-icon {
    width: 1.25rem;
    height: 1.25rem;
  }

  .sun-icon {
    transition: display 0.3s ease;
  }

  .moon-icon {
    transition: display 0.3s ease;
  }

  :root[data-theme="light"] .sun-icon {
    display: none !important;
  }

  :root[data-theme="light"] .moon-icon {
    display: block;
  }

  :root[data-theme="dark"] .sun-icon {
    display: block !important;
  }

  :root[data-theme="dark"] .moon-icon {
    display: none;
  }

  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) .sun-icon {
      display: none !important;
    }
    :root:not([data-theme]) .moon-icon {
      display: block;
    }
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) .sun-icon {
      display: block !important;
    }
    :root:not([data-theme]) .moon-icon {
      display: none;
    }
  }
</style>

<script>
  (function() {
    const toggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const storageKey = 'theme-preference';

    // Detect system preference
    const getSystemTheme = () => {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    };

    // Get saved preference or system preference
    const getSavedTheme = () => {
      return localStorage.getItem(storageKey) || 'dark';
    };

    // Set theme
    const setTheme = (theme) => {
      html.setAttribute('data-theme', theme);
      localStorage.setItem(storageKey, theme);
    };

    // Initialize theme on page load
    const initTheme = () => {
      const savedTheme = getSavedTheme();
      setTheme(savedTheme);
    };

    // Toggle theme on button click
    if (toggle) {
      toggle.addEventListener('click', () => {
        const current = html.getAttribute('data-theme') || 'dark';
        const next = current === 'dark' ? 'light' : 'dark';
        setTheme(next);
      });
    }

    // Run on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initTheme);
    } else {
      initTheme();
    }
  })();
</script>
