<section id="footer">
        <hr class="mt-lg mb-lg">
        <div class="row justify-between justify-md-center">
            <div class="col col-2 flex justify-md-center mb-md">
                {% include svg/logo.svg %}
            </div>
            <div class="col col-6 mb-lg">
                    <ul class="flex justify-center">
                        {% for item in site.data.menu %}
                            <li><a href="{{item.link}}" class="{% if page.url == item.link %} active {% endif %} footer-links pt-xs pb-xs pl-sm pr-sm">{{item.title}}</a></li>                         
                        {% endfor %}
                    </ul>
            </div>
            <div class="col col-2">
                <div class="flex justify-end gap-sm justify-md-center">
                    <a href="https://www.instagram.com/instamaticchad/" class="icon-footer">
                        {% include svg/icon-insta.svg %}
                    </a>
                    <a href="https://www.linkedin.com/in/chad-matthew-danford-44a82764/" class="icon-footer">
                        {% include svg/icon-linkedin.svg %}
                    </a>
                </div>
            </div>
        </div>
        <div class="flex justify-center mt-md">
            <p><small>&copy; {{ site.time | date: '%Y' }} | Chad Matthew Danford</small></p>
        </div>
</section>
