<form class="form" id="contact-form" action="https://docs.google.com/forms/d/e/1FAIpQLSdku6KWJUM9a3bfVtpS7UfQLZuF1k98cTe8hpo2msL7XSb9Qw/formResponse">
    <div class="form__top">
        <div class="form__group">
            <label class="form__label screen-reader-text" for="form-name">Your Name</label>
            <input class="form__input" id="form-name" type="text" name="entry.278300584" placeholder="Your name" required="">
        </div>
        <div class="form__group">
            <label class="form__label screen-reader-text" for="form-email">Your Email</label>
            <input class="form__input" id="form-email" type="email" name="entry.1749120134" placeholder="Your email" required="">
        </div>
    </div>
    <div class="form__group">
        <label class="form__label screen-reader-text" for="form-text">Your Message</label>
        <textarea class="form__input" id="form-text" name="entry.1858543278" rows="8" placeholder="Your message" required=""></textarea>
        <div style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;" aria-hidden="true">
            <label for="hp-website" class="screen-reader-text">Leave this field empty</label>
            <input id="hp-website" name="website" type="text" tabindex="-1" autocomplete="off" />
        </div>
    </div>
    <div class="form__group">
        <button class="btn-primary btn-md btn-maxw" type="submit">send message</button>
    </div>
</form>
<script>
(function(){
  var form = document.getElementById('contact-form');
  if(!form) return;
  var hp = form.querySelector('input[name="website"]');
  
  form.addEventListener('submit', function(e){
    if(hp && hp.value && hp.value.trim() !== ''){
      e.preventDefault();
      return;
    }
    
    e.preventDefault();
    
    // Create FormData from the form
    var formData = new FormData(form);
    
    // Submit to Google Forms using fetch (no-cors to avoid blocking)
    fetch(form.action, {
      method: 'POST',
      body: formData,
      mode: 'no-cors'
    }).then(function(){
      // Redirect to success page after submission
      window.location.href = '/success/';
    }).catch(function(){
      // Even if fetch fails, redirect
      window.location.href = '/success/';
    });
  });
})();
</script>
